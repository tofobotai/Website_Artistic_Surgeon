<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scroll-Driven Animation</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="intro">
        <h1>A simple intro section.</h1>
    </div>

    <section class="spotlight">
        <div class="spotlight-intro-text-wrapper">
            <div class="spotlight-intro-text">
                <p>Welcome</p>
            </div>
            <div class="spotlight-intro-text">
                <p>to the spotlight</p>
            </div>
        </div>

        <div class="spotlight-bg-image">
            <img src="image5.png" alt="">
        </div>

        <div class="spotlight-titles-container">
            <div class="spotlight-titles"></div>
        </div>

        <div class="spotlight-images"></div>

        <div class="spotlight-header">
            <p>Spotlight</p>
        </div>
    </section>

    <div class="outro">
        <p>A simple outro section.</p>
    </div>

    <script src="main.js" type="module"></script>
</body>
</html>
